name: lab4

on:
  push:
    paths:
      - "lab4/**"
      - ".github/workflows/lab4.yml"
  pull_request:
    paths:
      - "lab4/**"
      - ".github/workflows/lab4.yml"

jobs:
  check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lab4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml ruff mypy

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy isa.py machine.py translator.py golden/golden_test.py golden/update_goldens.py

      - name: Test
        run: pytest -v -m "not slow"
