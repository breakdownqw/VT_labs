in_source: "\\ Sort one-digit numbers.\n\\ Input format:\n\\ first char: count n\n\\ then n digit chars, separated by newlines\
  \ or spaces\n\narray nums 16\n\nvar n\nvar i\nvar j\nvar temp\n\n\n: skip-separators\n  begin\n    read-char\n    dup '\\\
  n' =\n    over ' ' =\n    +\n  while\n    drop\n  repeat\n;\n\n\n: read-digit\n  skip-separators\n  '0' -\n;\n\n\n: read-input\n\
  \  read-digit n !\n\n  0 i !\n\n  begin\n    i @ n @ <\n  while\n    read-digit nums i @ + !\n    i @ 1 + i !\n  repeat\n\
  ;\n\n\n: sort-array\n  0 i !\n\n  begin\n    i @ n @ <\n  while\n\n    0 j !\n\n    begin\n      j @ n @ 1 - i @ - <\n \
  \   while\n\n      nums j @ + @\n      nums j @ 1 + + @\n      >\n      if\n        nums j @ + @ temp !\n\n        nums\
  \ j @ 1 + + @\n        nums j @ + !\n\n        temp @\n        nums j @ 1 + + !\n      then\n\n      j @ 1 + j !\n    repeat\n\
  \n    i @ 1 + i !\n  repeat\n;\n\n\n: print-array\n  0 i !\n\n  begin\n    i @ n @ <\n  while\n    nums i @ + @ .\n\n  \
  \  i @ n @ 1 - <\n    if\n      ' ' emit\n    then\n\n    i @ 1 + i !\n  repeat\n\n  '\\n' emit\n;\n\n\n: main\n  read-input\n\
  \  sort-array\n  print-array\n;"
