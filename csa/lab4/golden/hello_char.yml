  0008 - 11220004 - addi sp, sp, 4
  000C - 1122FFFC - addi sp, sp, -4
  0010 - 40520000 - lw t1, 0(sp)
  0014 - 11403FC4 - addi t0, zero, 0x3FC4
  0018 - 43540000 - sb t1, 0(t0)
  001C - 00000000 - halt
out_stdout: A
