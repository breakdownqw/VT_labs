in_source: "\\ Double precision demo.\n\\ 64-bit addition using two 32-bit words:\n\\ 0x00000001_FFFFFFFF + 0x00000000_00000001\
  \ = 0x00000002_00000000\n\nvar a_hi\nvar a_lo\nvar b_hi\nvar b_lo\nvar r_hi\nvar r_lo\nvar carry\n\npstr hi_label \"hi=\"\
  \npstr lo_label \" lo=\"\n\n\n: add64\n  \\ low part\n  a_lo @ b_lo @ + r_lo !\n\n  \\ carry = 1 if r_lo < a_lo as unsigned\
  \ 32-bit values, else 0\n  r_lo @ a_lo @ u< carry !\n\n  \\ high part\n  a_hi @ b_hi @ + carry @ + r_hi !\n;\n\n\n: main\n\
  \  1 a_hi !\n  -1 a_lo !\n\n  0 b_hi !\n  1 b_lo !\n\n  add64\n\n  hi_label type-pstr\n  r_hi @ .\n  lo_label type-pstr\n\
  \  r_lo @ .\n  '\\n' emit\n;\n"
in_stdin: ''
