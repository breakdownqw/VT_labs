in_source: "\\ Euler problem 4:\n\\ largest palindrome made from product of two 3-digit numbers.\n\nvar best\nvar i\nvar j\n\
  var step\nvar product\n\nvar n\nvar original\nvar reversed\nvar digit\n\n\n: palindrome?\n  n !\n  n @ original !\n  0 reversed\
  \ !\n\n  begin\n    n @ 0 >\n  while\n    n @ 10 mod digit !\n    reversed @ 10 * digit @ + reversed !\n    n @ 10 / n !\n\
  \  repeat\n\n  original @ reversed @ =\n;\n\n\n: main\n  0 best !\n\n  999 i !\n\n  begin\n    i @ 100 >=\n  while\n\n \
  \   i @ 11 mod 0 =\n    if\n      999 j !\n      1 step !\n    else\n      990 j !\n      11 step !\n    then\n\n    begin\n\
  \      j @ 100 >=\n    while\n\n      i @ j @ * product !\n\n      product @ best @ >\n      if\n        product @ palindrome?\n\
  \        if\n          product @ best !\n        then\n\n        j @ step @ - j !\n      else\n        99 j !\n      then\n\
  \n    repeat\n\n    i @ 1 - i !\n  repeat\n\n  best @ .\n  '\\n' emit\n;"
