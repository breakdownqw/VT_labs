in_source: "pstr question \"What is your name?\"\npstr greeting \"Hello, \"\npstr exclamation \"!\"\n\narray name 32\n\nvar\
  \ len\nvar index\n\n\n: read-name\n  0 len !\n\n  begin\n    read-char\n\n    dup '\\n' =\n    if\n      drop\n      1\n\
  \    else\n      name len @ + !\n      len @ 1 + len !\n      0\n    then\n  until\n;\n\n\n: print-name\n  0 index !\n\n\
  \  begin\n    index @ len @ <\n  while\n    name index @ + @ emit\n    index @ 1 + index !\n  repeat\n;\n\n\n: main\n  question\
  \ type-pstr\n  '\\n' emit\n\n  read-name\n\n  greeting type-pstr\n  print-name\n  exclamation type-pstr\n  '\\n' emit\n\
  ;\n"
in_stdin: 'Alice

  '
