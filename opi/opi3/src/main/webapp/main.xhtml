<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Main</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="#{request.contextPath}/static/css/main.css"/>
</h:head>

<h:body>
    <!-- Шапка -->
    <div class="header">
        Новиков Даниил Дмитриевич | Р3231 | 8374
    </div>

    <!-- Основная сетка -->
    <main class="main-grid">
        <h:form styleClass="form" id="pointForm">
            <!-- Левая колонка: Ввод + Отправить -->
            <aside class="side left">
                <div class="panel grow">
                    <h2>Ввод</h2>

                    <!-- X -->
                    <h:outputLabel value="X:" for="xInput" />
                    <h:selectOneMenu id="xInput" styleClass="input" value="#{pointBean.x}">
                        <f:selectItem itemLabel="-5" itemValue="-5"/>
                        <f:selectItem itemLabel="-4" itemValue="-4"/>
                        <f:selectItem itemLabel="-3" itemValue="-3"/>
                        <f:selectItem itemLabel="-2" itemValue="-2"/>
                        <f:selectItem itemLabel="-1" itemValue="-1"/>
                        <f:selectItem itemLabel="0" itemValue="0"/>
                        <f:selectItem itemLabel="1" itemValue="1"/>
                        <f:selectItem itemLabel="2" itemValue="2"/>
                        <f:selectItem itemLabel="3" itemValue="3"/>
                    </h:selectOneMenu>

                    <!-- Y -->
                    <h:outputLabel for="yInput" value="Y:" />
                    <h:inputText id="yInput"
                                 styleClass="input"
                                 value="#{pointBean.y}"
                                 converter="doubleConverter">
                        <f:validator validatorId="yRangeValidator"/>
                    </h:inputText>


                    <h:outputLabel value="R:" for="rInput"/>
                    <!-- R -->
                    <h:selectOneMenu id="rInput"
                                     styleClass="input"
                                     value="#{pointBean.r}"
                                     onchange="setR(this.value)">
                        <f:selectItem itemLabel="1" itemValue="1"/>
                        <f:selectItem itemLabel="2" itemValue="2"/>
                        <f:selectItem itemLabel="3" itemValue="3"/>
                        <f:selectItem itemLabel="4" itemValue="4"/>
                    </h:selectOneMenu>
                </div>
                <div class="panel fixed">
                    <!-- Кнопка ОТПРАВИТЬ -->
                    <h:commandButton id="submitBtn"
                                     value="Отправить"
                                     styleClass="btn btn-primary full"
                                     action="#{pointBean.submit}"
                                     onclick="addPointFromForm();"/>
                    <h:commandButton id="hiddenSubmit"
                                     style="display:none"
                                     action="#{pointBean.submit}"/>
                </div>
            </aside>
        </h:form>

        <!-- Центр: Canvas -->
        <section class="center-panel">
            <div class="image-frame">
                <canvas id="mainCanvas"></canvas>
            </div>
        </section>

        <!-- Правая колонка: Таблица + Очистить -->
        <aside class="side right">
            <div class="panel grow">
                <h2>Таблица</h2>

                <!-- Сообщения об ошибках и обновлениях -->
                <h:messages id="msgs" style="color: red;" />

                <!-- Таблица данных -->
                <div style="max-height: 450px; overflow-y: auto; overflow-x: auto; margin-top: 10px;">
                    <h:dataTable id="hitsTable"
                                 value="#{tableBean.hitEntities}" var="hit"
                                 styleClass="table">
                        <!-- колонки -->
                        <h:column>
                            <f:facet name="header">X</f:facet>
                            #{hit.x}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Y</f:facet>
                            #{hit.y}
                        </h:column>

                        <h:column>
                            <f:facet name="header">R</f:facet>
                            #{hit.r}
                        </h:column>

                        <h:column>
                            <f:facet name="header">Статус</f:facet>
                            <h:outputText value="#{hit.isHit ? 'Попадание' : 'Мимо'}" />
                        </h:column>

                        <h:column>
                            <f:facet name="header">Текущее время</f:facet>
                            <h:outputText value="#{hit.nowTime}">
                                <f:convertDateTime pattern="HH:mm:ss dd.MM.yyyy" />
                            </h:outputText>
                        </h:column>

                        <h:column>
                            <f:facet name="header">Время работы</f:facet>
                            #{hit.workTime} мс
                        </h:column>
                    </h:dataTable>
                </div>
                <div class="panel fixed" style="margin-top: 15px;">
                    <h:form>
                        <h:commandButton id="delete_button"
                                         value="Очистить таблицу"
                                         styleClass="btn btn-warning full"
                                         action="#{tableBean.clearTable}"
                                         onclick="clearPoints();"/>
                    </h:form>
                </div>
            </div>
        </aside>
    </main>

    <!-- Нижняя панель: Назад -->
    <footer class="footer">
        <h:form>
            <h:commandButton value="Назад"
                             action="goStart"
                             styleClass="btn btn-secondary wide"/>
        </h:form>
    </footer>

    <!-- Скрипт -->
    <script src="#{request.contextPath}/static/js/main.js"></script>
</h:body>
</html>
